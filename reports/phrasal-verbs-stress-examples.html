<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>구동사 예문 강세 암기장</title>
  <style>
    :root {
      --bg: #f4f6fa;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e1ed;
      --blue: #2457c5;
      --green: #0f766e;
      --orange: #f97316;
      --orange-soft: #fff1e7;
      --shadow: 0 8px 24px rgba(23,32,51,.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }
    .wrap { width: min(1180px, calc(100% - 18px)); margin: 0 auto; }
    header { padding: 24px 0 14px; }
    h1 { margin: 0 0 7px; font-size: clamp(24px, 4vw, 38px); line-height: 1.14; letter-spacing: 0; }
    .lead { margin: 0; color: var(--muted); font-weight: 750; }
    .sticky {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,.96);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 2px 12px rgba(23,32,51,.06);
      backdrop-filter: blur(10px);
    }
    .bar {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 8px 0;
    }
    .stats, .tools { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
    .pill {
      border-radius: 999px;
      padding: 7px 10px;
      background: #fff;
      box-shadow: 0 1px 6px rgba(23,32,51,.08);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }
    .gap-control {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 1px 6px rgba(23,32,51,.08);
      padding: 6px 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }
    .gap-control input {
      width: 58px;
      min-width: 58px;
      padding: 3px 5px;
      box-shadow: none;
      border: 1px solid var(--line);
      text-align: center;
    }
    input, select, button {
      border: 0;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 1px 6px rgba(23,32,51,.08);
      padding: 8px 10px;
      font: inherit;
      font-weight: 800;
    }
    input { min-width: 230px; font-weight: 650; }
    #search {
      width: 130px;
      min-width: 90px;
      max-width: 130px;
      flex: 0 0 130px;
    }
    button { cursor: pointer; }
    .primary { background: var(--blue); color: #fff; }
    .stop { background: #fff7ed; color: #9a3412; }
    main { padding: 12px 0 42px; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .group {
      margin: 14px 0 2px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #eaf0fb;
      color: #263248;
      font-weight: 950;
    }
    .card {
      display: grid;
      grid-template-columns: minmax(150px, 22%) 1fr auto;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid rgba(217,225,237,.7);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .meta {
      padding: 11px 12px;
      background: #fbfcff;
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 5px;
      justify-content: center;
    }
    .num { color: var(--muted); font-size: 12px; font-weight: 900; }
    .number-line {
      display: flex;
      align-items: baseline;
      gap: 7px;
      flex-wrap: nowrap;
      white-space: nowrap;
    }
    .seq { color: var(--blue); font-size: 24px; font-weight: 950; line-height: 1; }
    .old-id { color: var(--muted); font-size: 11px; font-weight: 850; }
    .verb { font-size: 18px; font-weight: 950; line-height: 1.15; }
    .meaning { color: var(--green); font-weight: 850; }
    .grammar-tag {
      display: inline-flex;
      width: fit-content;
      max-width: 100%;
      border-radius: 999px;
      padding: 3px 7px;
      background: #fff1e7;
      color: #9a3412;
      font-size: 11px;
      font-weight: 950;
      white-space: nowrap;
    }
    .example {
      padding: 13px 15px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      justify-content: center;
      min-width: 0;
    }
    .english {
      font-size: clamp(19px, 2.6vw, 30px);
      line-height: 1.28;
      font-weight: 900;
      letter-spacing: 0;
      word-break: normal;
      overflow-wrap: anywhere;
    }
    .english.editable {
      padding: 8px;
      margin: -8px;
      border-radius: 8px;
      background: #fff7ed;
      user-select: none;
    }
    .english-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-width: 0;
    }
    .english-row .english {
      flex: 1;
      min-width: 0;
    }
    .stress {
      color: var(--orange);
      font-weight: 950;
      text-shadow: 0 0 0 currentColor;
    }
    .char {
      display: inline-block;
      min-width: .18em;
      border-radius: 4px;
      cursor: pointer;
    }
    .char:hover { background: #fed7aa; }
    .manual-tag {
      display: inline-flex;
      align-items: center;
      flex: 0 0 auto;
      width: fit-content;
      border-radius: 999px;
      padding: 3px 7px;
      background: #fff7ed;
      color: #9a3412;
      font-size: 11px;
      font-weight: 950;
      white-space: nowrap;
    }
    .korean { color: #475467; font-size: 15px; font-weight: 750; }
    .narration {
      margin-top: 2px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .narration-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 950;
    }
    .narration-chunks {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    .narration-chip {
      display: inline-flex;
      align-items: center;
      min-height: 31px;
      padding: 5px 9px;
      border: 1px solid #f2d2a8;
      border-radius: 8px;
      background: #fffaf1;
      color: #9a6a28;
      font-size: 17px;
      line-height: 1.25;
      font-weight: 950;
      box-shadow: 0 1px 5px rgba(154,106,40,.12);
    }
    .narration-sep {
      color: #9a6a28;
      font-size: 20px;
      line-height: 1;
      font-weight: 950;
    }
    .test-answer {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      box-shadow: none;
      background: #fff;
      font-size: 18px;
      font-weight: 850;
    }
    .test-result {
      min-height: 20px;
      font-size: 13px;
      font-weight: 900;
      color: var(--muted);
    }
    .test-result.ok { color: var(--green); }
    .test-result.miss { color: #b42318; }
    body.test-mode .english { display: none; }
    body.test-mode .english.revealed { display: block; }
    .actions {
      padding: 10px;
      background: #fbfcff;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tiny { padding: 7px 9px; font-size: 12px; }
    .card.done .meta, .card.done .actions { background: #e8f8f4; }
    .card.reading { outline: 3px solid #fdba74; background: #fffbf5; }
    audio { width: min(100%, 420px); height: 32px; }
    body.en-only .korean { display: none; }
    body.ko-only .english { display: none; }
    body.ko-only .narration { display: none; }
    body.test-mode .narration { display: none; }
    body.test-mode .english.revealed { display: block; }
    body.no-stress .stress { color: inherit; text-shadow: none; }
    body.no-stress .char.stress { color: inherit; }
    .empty {
      padding: 22px;
      background: #fff;
      border-radius: 8px;
      text-align: center;
      color: var(--muted);
      font-weight: 850;
    }
    @media (max-width: 760px) {
      .bar { align-items: stretch; }
      .tools { width: 100%; }
      input { flex: 1; min-width: 160px; }
      #search {
        width: 92px;
        min-width: 78px;
        max-width: 92px;
        flex: 0 0 92px;
      }
      .card { grid-template-columns: 1fr; }
      .meta { border-right: 0; border-bottom: 1px solid var(--line); }
      .actions { justify-content: flex-end; }
      .english { font-size: 21px; }
      .english-row { flex-direction: column; gap: 6px; }
      .manual-tag { align-self: flex-end; }
      .narration-chip { font-size: 16px; }
    }
  </style>
</head>
<body>
  <header class="wrap">
    <h1>구동사 예문 강세 암기장</h1>
    <p class="lead">262개 표현의 예문 452개에 실제 문장 리듬에서 힘이 들어가는 핵심 초점만 주황색으로 표시했습니다. 여러 음절 단어는 단어 전체가 아니라 강세 음절만 칠했습니다.</p>
  </header>

  <div class="sticky">
    <div class="wrap bar">
      <div class="stats">
        <span class="pill" id="visibleCount">표시 0개</span>
        <span class="pill" id="doneCount">완료 0 / 524개</span>
      </div>
      <div class="tools">
        <input id="search" type="search" placeholder="검색: break, 고장, problem">
        <select id="category"></select>
        <select id="mode">
          <option value="both">영어+한글</option>
          <option value="en-only">영어만</option>
          <option value="ko-only">한글만</option>
        </select>
        <select id="filter">
          <option value="all">전체</option>
          <option value="todo">미완료</option>
          <option value="done">완료</option>
        </select>
        <audio id="ttsAudio" src="../output/phrasal_stress_tts/stress-examples-ava.mp3" preload="metadata"></audio>
        <button class="primary" id="readVisible">읽기</button>
        <label class="gap-control">간격 <input id="gapSeconds" type="number" min="0" max="5" step="0.1" value="1">초</label>
        <button id="toggleEdit">편집</button>
        <button id="toggleStress">강세</button>
        <button id="toggleTest">시험모드</button>
        <button class="stop" id="stopSpeech">멈춤</button>
      </div>
    </div>
  </div>

  <main class="wrap">
    <section id="cards" class="grid"></section>
  </main>

  <script>
    const DATA = [{"verb":"break down","meaning":"고장나다, 무너지다, 분석하다","image":"down=기능이 내려앉거나 쪼개짐","categoryKo":"이동/도착","examples":[{"en":"My car broke down.","ko":"내 차가 고장 났다."},{"en":"Can you break down the problem?","ko":"그 문제를 나누어서 설명해 줄 수 있어?"},{"en":"The nurse broke down the instructions into simple steps.","ko":"간호사는 지시사항을 쉬운 단계로 나누어 설명했다."}]},{"verb":"break in","meaning":"침입하다, 길들이다","image":"in=안으로 들어감","categoryKo":"이동/도착","examples":[{"en":"A thief broke in through the back door.","ko":"도둑이 뒷문으로 침입했다."},{"en":"I need to break in these new shoes.","ko":"이 새 신발을 길들여야 한다."},{"en":"Someone tried to break in while we were away.","ko":"우리가 없는 동안 누군가 침입하려고 했다."}]},{"verb":"break out","meaning":"발생하다, 탈출하다","image":"out=안에서 밖으로 터짐","categoryKo":"이동/도착","examples":[{"en":"A fire broke out in the kitchen.","ko":"부엌에서 불이 났다."},{"en":"The prisoners tried to break out at night.","ko":"죄수들은 밤에 탈출하려고 했다."},{"en":"A rash broke out after he took the medicine.","ko":"그가 약을 먹은 뒤 발진이 생겼다."}]},{"verb":"break up","meaning":"헤어지다, 해산하다","image":"up=하나가 여러 조각으로 흩어짐","categoryKo":"이동/도착","examples":[{"en":"They broke up last year.","ko":"그들은 작년에 헤어졌다."},{"en":"The police broke up the crowd.","ko":"경찰이 군중을 해산시켰다."},{"en":"The call kept breaking up during the meeting.","ko":"회의 중에 통화가 계속 끊겼다."}]},{"verb":"bring along","meaning":"데리고 오다, 가져오다","image":"along=함께 이동","categoryKo":"이동/도착","examples":[{"en":"Bring your laptop along to the meeting.","ko":"회의에 노트북을 가져오세요."},{"en":"Can I bring my brother along?","ko":"제 동생도 데리고 와도 될까요?"},{"en":"Bring along a copy of your ID.","ko":"신분증 사본을 가져오세요."}]},{"verb":"call back","meaning":"다시 전화하다","image":"back=응답으로 돌아감","categoryKo":"이동/도착","examples":[{"en":"I'll call you back later.","ko":"나중에 다시 전화할게."},{"en":"Please call me back tonight.","ko":"오늘 밤에 다시 전화해 주세요."},{"en":"The clinic called back with the test results.","ko":"병원에서 검사 결과를 알려 주려고 다시 전화했다."}]},{"verb":"call on","meaning":"방문하다, 지명하다","image":"on=상대에게 초점을 붙임","categoryKo":"이동/도착","examples":[{"en":"We called on our old teacher.","ko":"우리는 옛 선생님을 방문했다."},{"en":"The teacher called on me to answer.","ko":"선생님이 대답하라고 나를 지명했다."},{"en":"The manager called on everyone to speak honestly.","ko":"관리자는 모두에게 솔직히 말하라고 요청했다."}]},{"verb":"catch up","meaning":"따라잡다","image":"up=뒤처진 상태를 끌어올림","categoryKo":"이동/도착","examples":[{"en":"I need to catch up.","ko":"따라잡아야 해요."},{"en":"We need to catch up.","ko":"우리는 따라잡아야 합니다.","hidden":true},{"en":"I caught up on emails after lunch.","ko":"나는 점심 후에 밀린 이메일을 처리했다."}]},{"verb":"check in","meaning":"체크인하다, 안부 확인하다","image":"in=등록/확인 안으로 들어감","categoryKo":"이동/도착","examples":[{"en":"We checked in at noon.","ko":"우리는 정오에 체크인했다."},{"en":"I will check in with you tomorrow.","ko":"내일 네 안부를 확인하러 연락할게."},{"en":"She checked in with her team before leaving.","ko":"그녀는 떠나기 전에 팀과 상황을 확인했다."}]},{"verb":"check out","meaning":"확인하다, 계산하고 나가다","image":"out=밖으로 확인하거나 나감","categoryKo":"이동/도착","examples":[{"en":"Check out this app.","ko":"이 앱을 한번 확인해 봐."},{"en":"We checked out of the hotel at eleven.","ko":"우리는 11시에 호텔에서 체크아웃했다."},{"en":"You should check out the new report.","ko":"새 보고서를 한번 확인해 봐야 한다."}]},{"verb":"clear out","meaning":"비우다, 떠나다","image":"out=안의 것을 밖으로 뺌","categoryKo":"이동/도착","examples":[{"en":"We cleared out the garage.","ko":"우리는 차고를 비웠다."},{"en":"The guests cleared out after midnight.","ko":"손님들은 자정이 지나 떠났다."},{"en":"They cleared out the storage room in the morning.","ko":"그들은 오전에 창고를 비웠다."}]},{"verb":"come along","meaning":"따라오다, 진전되다","image":"along=함께 앞으로 감","categoryKo":"이동/도착","examples":[{"en":"How is the project coming along?","ko":"그 프로젝트는 어떻게 진행되고 있어?"},{"en":"You can come along with us.","ko":"우리와 같이 와도 돼."},{"en":"Your pronunciation is coming along nicely.","ko":"당신의 발음이 잘 늘고 있다."}]},{"verb":"come back","meaning":"돌아오다","image":"back=원래 쪽으로 돌아감","categoryKo":"이동/도착","examples":[{"en":"Come back soon.","ko":"곧 돌아오세요."},{"en":"Please come back soon.","ko":"곧 다시 오세요.","hidden":true},{"en":"The pain came back in the evening.","ko":"저녁에 통증이 다시 돌아왔다."}]},{"verb":"come down","meaning":"내려오다, 가격이 떨어지다","image":"down=아래로 이동","categoryKo":"이동/도착","examples":[{"en":"The kids came down the stairs.","ko":"아이들이 계단을 내려왔다."},{"en":"Prices came down after the holiday.","ko":"연휴가 지나 가격이 떨어졌다."},{"en":"The fever came down after midnight.","ko":"자정 이후 열이 내려갔다."}]},{"verb":"come down with","meaning":"병에 걸리다","image":"down=몸 상태가 내려감","categoryKo":"이동/도착","examples":[{"en":"I came down with a cold.","ko":"나는 감기에 걸렸다."},{"en":"I came down with a cold.","ko":"감기에 걸렸어요.","hidden":true},{"en":"She came down with a sore throat.","ko":"그녀는 목감기에 걸렸다."}]},{"verb":"come in","meaning":"들어오다","image":"in=안으로 진입","categoryKo":"이동/도착","examples":[{"en":"Come in.","ko":"들어오세요."},{"en":"Please come in.","ko":"들어오세요.","hidden":true},{"en":"The first results came in this afternoon.","ko":"첫 결과가 오늘 오후에 들어왔다."}]},{"verb":"come over","meaning":"들르다","image":"over=상대 쪽으로 넘어옴","categoryKo":"이동/도착","examples":[{"en":"Come over tonight.","ko":"오늘 밤에 오세요."},{"en":"Please come over tonight.","ko":"오늘 밤에 꼭 와주세요.","hidden":true},{"en":"Why don't you come over after work?","ko":"퇴근 후에 들르는 게 어때?"}]},{"verb":"come up","meaning":"나타나다, 언급되다","image":"up=표면 위로 올라옴","categoryKo":"이동/도착","examples":[{"en":"Something came up.","ko":"갑자기 일이 생겼다."},{"en":"A new issue came up.","ko":"새로운 문제가 나왔다."},{"en":"Your name came up during the interview.","ko":"면접 중에 네 이름이 언급됐다."}]},{"verb":"drop by","meaning":"잠깐 들르다","image":"by=지나가는 길에","categoryKo":"이동/도착","examples":[{"en":"Drop by anytime.","ko":"언제든지 들러주세요."},{"en":"Please drop by anytime.","ko":"언제든지 들러주세요.","hidden":true},{"en":"I'll drop by your office later.","ko":"나중에 네 사무실에 잠깐 들를게."}]},{"verb":"drop off","meaning":"떨어뜨려 주다, 감소하다","image":"off=목적지에 내려놓음","categoryKo":"이동/도착","examples":[{"en":"I'll drop you off at the station.","ko":"역까지 데려다줄게."},{"en":"Sales dropped off after summer.","ko":"여름이 지나자 매출이 줄었다."},{"en":"Can you drop off the documents at reception?","ko":"서류를 접수처에 맡겨 줄 수 있나요?"}]},{"verb":"fall down","meaning":"넘어지다","image":"down=아래로 떨어짐","categoryKo":"이동/도착","examples":[{"en":"She fell down.","ko":"그녀는 넘어졌다."},{"en":"He fell down.","ko":"그는 넘어졌다.","hidden":true},{"en":"The old fence fell down in the storm.","ko":"낡은 울타리가 폭풍에 쓰러졌다."}]},{"verb":"get around","meaning":"돌아다니다, 문제를 피하다","image":"around=주변으로 돌아감","categoryKo":"이동/도착","examples":[{"en":"She gets around the city by bus.","ko":"그녀는 버스로 도시를 돌아다닌다."},{"en":"We found a way to get around the rule.","ko":"우리는 그 규칙을 피할 방법을 찾았다."},{"en":"News gets around quickly in a small town.","ko":"작은 마을에서는 소문이 빨리 퍼진다."}]},{"verb":"get away","meaning":"떠나다, 빠져나가다","image":"away=멀리 벗어남","categoryKo":"이동/도착","examples":[{"en":"Let's get away this weekend.","ko":"이번 주말에 떠나자."},{"en":"The thief tried to get away through the alley.","ko":"도둑은 골목으로 빠져나가려 했다."},{"en":"We need to get away from the noise for a while.","ko":"우리는 잠시 소음에서 벗어나야 한다."}]},{"verb":"get away with","meaning":"벌 안 받고 넘어가다","image":"away=책임에서 벗어남","categoryKo":"이동/도착","examples":[{"en":"He got away with lying to the teacher.","ko":"그는 선생님에게 거짓말하고도 벌을 받지 않았다."},{"en":"You cannot get away with this mistake.","ko":"이 실수를 그냥 넘길 수는 없다."},{"en":"He got away with being late again.","ko":"그는 또 늦고도 그냥 넘어갔다."}]},{"verb":"get back","meaning":"돌아오다, 되찾다","image":"back=원래 쪽으로 회복","categoryKo":"이동/도착","examples":[{"en":"I'll get back home before dinner.","ko":"저녁 전에 집에 돌아올게."},{"en":"She got back her lost wallet.","ko":"그녀는 잃어버린 지갑을 되찾았다."},{"en":"I'll get back to you after I check the schedule.","ko":"일정을 확인한 뒤 다시 연락드리겠습니다."}]},{"verb":"get by","meaning":"그럭저럭 해내다","image":"by=간신히 지나감","categoryKo":"이동/도착","examples":[{"en":"I can get by in English.","ko":"영어로 지낼 수 있어요."},{"en":"We can get by in English.","ko":"우리는 영어로 할 수 있습니다.","hidden":true},{"en":"She gets by with a little help from her neighbors.","ko":"그녀는 이웃들의 작은 도움으로 그럭저럭 지낸다."}]},{"verb":"get down","meaning":"내려오다, 우울하게 만들다","image":"down=아래로 낮아짐","categoryKo":"이동/도착","examples":[{"en":"Get down from the ladder slowly.","ko":"사다리에서 천천히 내려와."},{"en":"Rainy days get me down.","ko":"비 오는 날은 나를 우울하게 한다."},{"en":"The bad news got everyone down.","ko":"그 나쁜 소식이 모두를 우울하게 했다."}]},{"verb":"get in","meaning":"들어가다, 도착하다","image":"in=안으로 들어감","categoryKo":"이동/도착","examples":[{"en":"What time did you get in?","ko":"몇 시에 도착했어?"},{"en":"I got in late last night.","ko":"나는 어젯밤 늦게 도착했다."},{"en":"The train got in ten minutes early.","ko":"기차가 10분 일찍 도착했다."}]},{"verb":"get into","meaning":"관심 갖다, 들어가다","image":"into=새 영역 안으로 진입","categoryKo":"이동/도착","examples":[{"en":"I'm getting into jazz these days.","ko":"요즘 재즈에 관심이 생기고 있다."},{"en":"The cat got into the box.","ko":"고양이가 상자 안으로 들어갔다."},{"en":"He got into photography last winter.","ko":"그는 지난겨울 사진에 관심을 갖게 됐다."}]},{"verb":"get off","meaning":"내리다, 퇴근하다","image":"off=붙어 있던 곳에서 떨어짐","categoryKo":"이동/도착","examples":[{"en":"I get off work at six.","ko":"나는 6시에 퇴근한다."},{"en":"We got off the bus downtown.","ko":"우리는 시내에서 버스에서 내렸다."},{"en":"I got off the phone just now.","ko":"방금 전화를 끊었다."}]},{"verb":"get on","meaning":"타다, 계속하다","image":"on=위에 올라타거나 진행에 붙음","categoryKo":"이동/도착","examples":[{"en":"Get on the bus.","ko":"버스에 타."},{"en":"How are you getting on?","ko":"요즘 어떻게 지내고 있어?"},{"en":"She got on well with the new supervisor.","ko":"그녀는 새 상사와 잘 지냈다."}]},{"verb":"get out","meaning":"나가다, 빠져나오다","image":"out=밖으로 이동","categoryKo":"이동/도착","examples":[{"en":"Get out of the room now.","ko":"지금 방에서 나가."},{"en":"He got out of trouble with help.","ko":"그는 도움을 받아 곤란에서 빠져나왔다."},{"en":"The truth got out faster than expected.","ko":"진실이 예상보다 빨리 새어 나갔다."}]},{"verb":"get over","meaning":"극복하다","image":"over=장애물을 넘어감","categoryKo":"이동/도착","examples":[{"en":"She got over the flu.","ko":"그녀는 독감을 이겨냈습니다."},{"en":"He got over the flu.","ko":"그는 독감을 이겨냈습니다.","hidden":true},{"en":"He still hasn't got over the shock.","ko":"그는 아직 그 충격을 극복하지 못했다."}]},{"verb":"give back","meaning":"돌려주다","image":"back=원래 주인에게 돌아감","categoryKo":"이동/도착","examples":[{"en":"Give it back.","ko":"돌려주세요."},{"en":"Please give it back.","ko":"돌려주세요.","hidden":true},{"en":"The program gives back time to busy staff.","ko":"그 프로그램은 바쁜 직원들에게 시간을 돌려준다."}]},{"verb":"give in","meaning":"굴복하다","image":"in=압력 안으로 들어감","categoryKo":"이동/도착","examples":[{"en":"He finally gave in.","ko":"그는 결국 굴복했다."},{"en":"Do not give in to pressure.","ko":"압박에 굴복하지 마라."},{"en":"The company gave in to public pressure.","ko":"회사는 여론의 압박에 굴복했다."}]},{"verb":"give up","meaning":"포기하다","image":"up=손을 들어 내려놓음","categoryKo":"이동/도착","examples":[{"en":"Don't give up.","ko":"포기하지 마세요."},{"en":"Please don't give up.","ko":"포기하지 마세요.","hidden":true},{"en":"He gave up his seat to an elderly woman.","ko":"그는 노인 여성에게 자리를 양보했다."}]},{"verb":"go after","meaning":"뒤쫓다, 추구하다","image":"after=뒤를 따라감","categoryKo":"이동/도착","examples":[{"en":"The dog went after the ball.","ko":"개가 공을 뒤쫓았다."},{"en":"She decided to go after her dream.","ko":"그녀는 꿈을 추구하기로 했다."},{"en":"She went after the promotion with confidence.","ko":"그녀는 자신 있게 승진 기회를 추구했다."}]},{"verb":"go along with","meaning":"동의하다, 따라가다","image":"along=같은 방향으로 감","categoryKo":"이동/도착","examples":[{"en":"I went along with the plan.","ko":"나는 그 계획에 동의하고 따랐다."},{"en":"She went along with their decision.","ko":"그녀는 그들의 결정에 따랐다."},{"en":"I went along with the change for now.","ko":"나는 일단 그 변화에 따랐다."}]},{"verb":"go away","meaning":"떠나다, 사라지다","image":"away=멀리 감","categoryKo":"이동/도착","examples":[{"en":"Please go away for a minute.","ko":"잠깐만 가 주세요."},{"en":"The pain went away after lunch.","ko":"점심 후에 통증이 사라졌다."},{"en":"The smell finally went away.","ko":"그 냄새가 마침내 사라졌다."}]},{"verb":"go back","meaning":"돌아가다","image":"back=원래 쪽으로 감","categoryKo":"이동/도착","examples":[{"en":"Let's go back.","ko":"돌아가자."},{"en":"Let's go back.","ko":"이제 돌아가자.","hidden":true},{"en":"This tradition goes back hundreds of years.","ko":"이 전통은 수백 년 전으로 거슬러 올라간다."}]},{"verb":"go by","meaning":"시간이 지나다","image":"by=옆을 지나감","categoryKo":"이동/도착","examples":[{"en":"Time goes by fast.","ko":"시간은 빠르게 흘러갑니다."},{"en":"Time goes by fast.","ko":"시간은 또 빠르게 흘러갑니다.","hidden":true},{"en":"A full year went by before we met again.","ko":"우리가 다시 만나기 전 1년이 흘렀다."}]},{"verb":"go down","meaning":"내려가다, 기록되다","image":"down=아래로 이동","categoryKo":"이동/도착","examples":[{"en":"The elevator went down to the lobby.","ko":"엘리베이터가 로비로 내려갔다."},{"en":"This day will go down in history.","ko":"이 날은 역사에 기록될 것이다."},{"en":"The system went down during peak hours.","ko":"사용량이 많은 시간에 시스템이 다운됐다."}]},{"verb":"grow up","meaning":"자라다","image":"up=성숙한 상태로 올라감","categoryKo":"이동/도착","examples":[{"en":"I grew up in Seoul.","ko":"나는 서울에서 자랐다."},{"en":"He wants to be a doctor when he grows up.","ko":"그는 커서 의사가 되고 싶어 한다."},{"en":"She grew up speaking two languages.","ko":"그녀는 두 언어를 쓰며 자랐다."}]},{"verb":"head back","meaning":"돌아가다","image":"back=원래 방향으로 향함","categoryKo":"이동/도착","examples":[{"en":"Let's head back.","ko":"돌아가자."},{"en":"Let's head back.","ko":"이제 돌아가자.","hidden":true},{"en":"We should head back before it gets dark.","ko":"어두워지기 전에 돌아가야 한다."}]},{"verb":"head for","meaning":"~로 향하다","image":"for=목표 방향","categoryKo":"이동/도착","examples":[{"en":"We headed for the exit.","ko":"우리는 출구로 향했다."},{"en":"The company is headed for trouble.","ko":"그 회사는 문제 쪽으로 가고 있다."},{"en":"The patient headed for the exit after checkout.","ko":"환자는 수납 후 출구로 향했다."}]},{"verb":"keep out","meaning":"못 들어오게 하다","image":"out=밖에 머물게 함","categoryKo":"이동/도착","examples":[{"en":"Keep out.","ko":"접근하지 마세요."},{"en":"Please keep out.","ko":"접근하지 마세요.","hidden":true},{"en":"A locked gate keeps visitors out after hours.","ko":"잠긴 문은 운영 시간 후 방문객을 들어오지 못하게 한다."}]},{"verb":"keep up","meaning":"따라가다, 유지하다","image":"up=수준을 맞춰 올림","categoryKo":"이동/도착","examples":[{"en":"I can't keep up with the class.","ko":"나는 수업 진도를 따라갈 수 없다."},{"en":"Keep up the good work.","ko":"좋은 일을 계속 유지하세요."},{"en":"It's hard to keep up with all the updates.","ko":"모든 업데이트를 따라가기는 어렵다."}]},{"verb":"knock down","meaning":"쓰러뜨리다","image":"down=아래로 넘어뜨림","categoryKo":"이동/도착","examples":[{"en":"The wind knocked down a tree.","ko":"바람이 나무를 쓰러뜨렸습니다."},{"en":"That wind knocked down a tree.","ko":"그 바람이 나무를 쓰러뜨렸습니다.","hidden":true},{"en":"They knocked down the price after negotiation.","ko":"그들은 협상 후 가격을 낮췄다."}]},{"verb":"live up to","meaning":"기대에 부응하다","image":"up=기준까지 올라감","categoryKo":"이동/도착","examples":[{"en":"It lived up to my expectations.","ko":"그것은 내 기대에 부응했습니다."},{"en":"It lived up to my expectations.","ko":"내 기대에 부응했습니다.","hidden":true},{"en":"The service lived up to its reputation.","ko":"그 서비스는 명성에 걸맞았다."}]},{"verb":"log in","meaning":"로그인하다","image":"in=시스템 안으로 들어감","categoryKo":"이동/도착","examples":[{"en":"Log in first.","ko":"먼저 로그인하세요."},{"en":"Please log in first.","ko":"먼저 로그인해주세요.","hidden":true},{"en":"You need to log in before you can edit the file.","ko":"파일을 편집하려면 먼저 로그인해야 한다."}]},{"verb":"look after","meaning":"돌보다","image":"after=뒤따라 챙김","categoryKo":"이동/도착","examples":[{"en":"Can you look after my dog?","ko":"내 개를 돌봐줄 수 있나요?"},{"en":"Can you look after my dog?","ko":"내 개를 돌봐줄 수 있나요?","hidden":true},{"en":"The team looks after elderly patients every day.","ko":"그 팀은 매일 노인 환자들을 돌본다."}]},{"verb":"look back","meaning":"돌아보다","image":"back=과거 쪽을 봄","categoryKo":"이동/도착","examples":[{"en":"Don't look back.","ko":"뒤돌아보지 마세요."},{"en":"Please don't look back.","ko":"뒤돌아보지 마세요.","hidden":true},{"en":"When I look back, that choice was right.","ko":"돌아보면 그 선택은 옳았다."}]},{"verb":"look down on","meaning":"깔보다","image":"down=아래로 내려다봄","categoryKo":"이동/도착","examples":[{"en":"Don't look down on others.","ko":"다른 사람을 무시하지 마십시오."},{"en":"Please don't look down on others.","ko":"다른 사람을 업신여기지 마시기 바랍니다.","hidden":true},{"en":"Never look down on small improvements.","ko":"작은 개선을 절대 얕보지 마라."}]},{"verb":"make for","meaning":"~로 향하다, 도움이 되다","image":"for=방향/결과를 향함","categoryKo":"이동/도착","examples":[{"en":"This makes for a good story.","ko":"이건 좋은 이야깃거리가 된다."},{"en":"Exercise makes for better sleep.","ko":"운동은     function sentenceWords(text) {
      return [...String(text).matchAll(/[A-Za-z0-9]+(?:'[A-Za-z]+)?/g)].map(match => ({
        word: match[0],
        index: match.index,
        end: match.index + match[0].length,
        normalized: normalizeToken(match[0])
      }));
    }
    function findVerbSpan(words, verb) {
      const parts = String(verb).toLowerCase().split(/\s+/).filter(Boolean);
      if (!parts.length) return null;
      for (let start = 0; start <= words.length - parts.length; start += 1) {
        const matched = parts.every((part, offset) => wordMatchesVerbPart(words[start + offset]?.word, part));
        if (matched) return { start, end: start + parts.length };
      }
      const lexicalParts = parts.filter(part => !PHRASAL_PARTICLES.has(part));
      if (!lexicalParts.length) return null;
      const fallbackStart = words.findIndex(word => lexicalParts.some(part => wordMatchesVerbPart(word.word, part)));
      return fallbackStart >= 0 ? { start: fallbackStart, end: fallbackStart + 1 } : null;
    }
    const NARRATION_BREAK_WORDS = new Set('after before because while when if with without from into onto through across around during by at in on over under for of as'.split(' '));
    function chunksFromBoundaries(text, words, boundaries) {
      const usable = [...boundaries]
        .filter(index => index > 0 && index < words.length)
        .sort((a, b) => a - b);
      const chunks = [];
      let start = 0;
      usable.forEach(boundary => {
        const end = words[boundary].index;
        const chunk = text.slice(start, end).trim();
        if (chunk) chunks.push(chunk);
        start = end;
      });
      const last = text.slice(start).trim();
      if (last) chunks.push(last);
      return chunks.filter(Boolean);
    }
    function narrationChunks(text, verb) {
      const clean = String(text).trim();
      const dashPieces = clean.split(/\s+[—–-]\s+/).map(item => item.trim()).filter(Boolean);
      if (dashPieces.length > 1) return dashPieces;
      const words = sentenceWords(clean);
      if (words.length <= 3) return [clean];
      const boundaries = new Set();
      const verbSpan = findVerbSpan(words, verb);
      if (verbSpan) {
        const prevWord = words[verbSpan.start - 1]?.normalized;
        const beforeVerb = prevWord === 'to' && verbSpan.start > 1 ? verbSpan.start - 1 : verbSpan.start;
        if (beforeVerb > 0) boundaries.add(beforeVerb);
        const prepIndex = words.findIndex((word, index) => (
          index > verbSpan.end &&
          index < words.length - 1 &&
          NARRATION_BREAK_WORDS.has(word.normalized)
        ));
        if (prepIndex > 0) boundaries.add(prepIndex);
        else if (verbSpan.start === 0 && verbSpan.end < words.length - 2) boundaries.add(verbSpan.end);
      }
      if (!boundaries.size && words.length >= 6) {
        const prepIndex = words.findIndex((word, index) => (
          index >= 3 &&
          index < words.length - 1 &&
          NARRATION_BREAK_WORDS.has(word.normalized)
        ));
        boundaries.add(prepIndex > 0 ? prepIndex : Math.ceil(words.length / 2));
      }
      return chunksFromBoundaries(clean, words, boundaries).slice(0, 4);
    }
    function narrationHtml(row) {
      const chunks = narrationChunks(row.en, row.verb);
      return `<div class="narration">
        <div class="narration-title">성우 낭독용 끊어읽기</div>
        <div class="narration-chunks">${chunks.map((chunk, index) => `${index ? '<span class="narration-sep">/</span>' : ''}<span class="narration-chip">${escapeHtml(chunk)}</span>`).join('')}</div>
      </div>`;
    }
    function rows() {
      const q = search.value.trim().toLowerCase();
      const cat = category.value;
      const f = filter.value;
      return DATA.flatMap((item, itemIndex) => (item.examples || []).map((example, exampleIndex) => ({
        id: `${itemIndex}-${exampleIndex}`,
        itemIndex,
        exampleIndex,
        verb: item.verb,
        meaning: item.meaning,
        image: item.image,
        categoryKo: item.categoryKo,
        en: example.en,
        ko: example.ko,
        hidden: !!example.hidden
      }))).filter(row => {
        if (row.hidden) return false;
        const isDone = done.has(row.id);
        if (cat !== '전체' && row.categoryKo !== cat) return false;
        if (f === 'done' && !isDone) return false;
        if (f === 'todo' && isDone) return false;
        if (!q) return true;
        return [row.verb, row.meaning, row.image, row.categoryKo, row.en, row.ko].join(' ').toLowerCase().includes(q);
      });
    }
    function render() {
      const rs = rows();
      document.body.classList.toggle('en-only', mode.value === 'en-only');
      document.body.classList.toggle('ko-only', mode.value === 'ko-only');
      document.body.classList.toggle('no-stress', !stressOn);
      document.body.classList.toggle('test-mode', testMode);
      visibleCount.textContent = `표시 ${rs.length}개`;
      const totalVisible = DATA.reduce((sum, item) => sum + (item.examples || []).filter(example => !example.hidden).length, 0);
      const visibleDone = rs.filter(row => done.has(row.id)).length;
      doneCount.textContent = `완료 ${visibleDone} / ${totalVisible}개`;
      if (!rs.length) {
        cards.innerHTML = '<div class="empty">조건에 맞는 예문이 없습니다.</div>';
        return;
      }
      let last = '';
      cards.innerHTML = rs.map((row, index) => {
        const group = row.categoryKo !== last ? (last = row.categoryKo, `<div class="group">${escapeHtml(row.categoryKo)}</div>`) : '';
        const doneClass = done.has(row.id) ? ' done' : '';
        const activeClass = activeId === row.id ? ' reading' : '';
        const manualTag = Array.isArray(customStress[row.id]) ? '<span class="manual-tag">직접 저장됨</span>' : '';
        return `${group}<article class="card${doneClass}${activeClass}" data-id="${row.id}" data-en="${escapeHtml(row.en)}">
          <div class="meta">
            <div class="number-line"><span class="seq">${index + 1}</span><span class="old-id">${String(row.itemIndex + 1).padStart(3, '0')}-${row.exampleIndex + 1}</span></div>
            <div class="verb">${escapeHtml(row.verb)}</div>
            <div class="meaning">${escapeHtml(row.meaning)}</div>
            ${grammarTagHtml(row.verb)}
          </div>
          <div class="example">
            <div class="english-row"><div class="english${editMode ? ' editable' : ''}" data-answer="${escapeHtml(row.en)}">${stressHtml(row)}</div>${manualTag}</div>
            ${testMode ? `<input class="test-answer" data-answer="${escapeHtml(row.en)}" placeholder="영어 예문을 입력하세요" autocomplete="off" spellcheck="false"><div class="test-result"></div>` : ''}
            <div class="korean">${escapeHtml(row.ko)}</div>
            ${narrationHtml(row)}
          </div>
          <div class="actions">
            <button class="tiny speak" type="button">읽기</button>
            ${testMode ? '<button class="tiny check-answer" type="button">확인</button><button class="tiny reveal-answer" type="button">정답</button>' : ''}
            <button class="tiny reset-stress" type="button">자동</button>
            <button class="tiny clear-stress" type="button">지우기</button>
            <button class="tiny done-toggle" type="button">${done.has(row.id) ? '완료 해제' : '완료'}</button>
          </div>
        </article>`;
      }).join('');
    }
    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...done]));
      syncState({ done: [...done] });
    }
    function saveStressEdits() {
      localStorage.setItem(STRESS_EDIT_KEY, JSON.stringify(customStress));
      syncState({ stressEdits: customStress });
    }
    function readingGapMs() {
      const value = Math.max(0, Math.min(5, Number(gapSeconds.value || 1)));
      return Math.round(value * 1000);
    }
    async function syncState(payload) {
      if (!API_AVAILABLE) return;
      try {
        await fetch('/api/state', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } catch {}
    }
    async function loadSharedState() {
      if (!API_AVAILABLE) return;
      try {
        const response = await fetch('/api/state', { cache: 'no-store' });
        if (!response.ok) return;
        const state = await response.json();
        if (state.stressEdits && typeof state.stressEdits === 'object') {
          customStress = Object.keys(state.stressEdits).length ? state.stressEdits : { ...SEEDED_STRESS_EDITS };
          localStorage.setItem(STRESS_EDIT_KEY, JSON.stringify(customStress));
        }
        if (Array.isArray(state.done)) {
          done.clear();
          state.done.forEach(id => done.add(id));
          localStorage.setItem(STORAGE_KEY, JSON.stringify([...done]));
        }
      } catch {}
    }
    function rowById(id) {
      const [itemIndex, exampleIndex] = String(id).split('-').map(Number);
      const item = DATA[itemIndex];
      const example = item?.examples?.[exampleIndex];
      if (!item || !example) return null;
      return { id, itemIndex, exampleIndex, verb: item.verb, en: example.en };
    }
    function manualSetFor(id) {
      if (!Array.isArray(customStress[id])) {
        const row = rowById(id);
        customStress[id] = row ? [...autoStressPositions(row.en, row.verb)] : [];
      }
      return new Set(customStress[id]);
    }
    function setManualStress(id, set) {
      customStress[id] = [...set].sort((a, b) => a - b);
      saveStressEdits();
    }
    function paintChar(target, force = null) {
      const id = target.dataset.id;
      const index = Number(target.dataset.index);
      if (!id || Number.isNaN(index)) return;
      const set = manualSetFor(id);
      const next = force ?? !set.has(index);
      next ? set.add(index) : set.delete(index);
      setManualStress(id, set);
      target.classList.toggle('stress', next);
      target.closest('.card')?.querySelector('.manual-tag')?.remove();
    }
    function downloadEdits() {
      const payload = {
        version: 1,
        savedAt: new Date().toISOString(),
        edits: customStress
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'phrasal-stress-edits.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }
    function stopAudio() {
      clearTimeout(queueTimer);
      queueTimer = null;
      stopAt = 0;
      ttsAudio.pause();
    }
    function playAudioSegment(id, onDone) {
      const segment = AUDIO_BY_ID.get(id);
      if (!segment || !ttsAudio.src) return false;
      stopAudio();
      activeId = id;
      render();
      stopAt = segment.end;
      ttsAudio.currentTime = Math.max(0, segment.start);
      ttsAudio.play().catch(() => {});
      const check = () => {
        if (!stopAt) return;
        if (ttsAudio.currentTime >= stopAt) {
          ttsAudio.pause();
          stopAt = 0;
          activeId = null;
          render();
          if (onDone) queueTimer = setTimeout(onDone, readingGapMs());
          return;
        }
        queueTimer = setTimeout(check, 80);
      };
      check();
      return true;
    }
    function speak(text, id) {
      if (playAudioSegment(id)) return;
      if (!('speechSynthesis' in window)) return;
      speechSynthesis.cancel();
      activeId = id;
      render();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.rate = 0.92;
      utterance.pitch = 1;
      utterance.onend = () => { activeId = null; render(); };
      speechSynthesis.speak(utterance);
    }
    function speakQueue(list) {
      if (!list.length) return;
      stopAudio();
      let i = 0;
      const next = () => {
        if (i >= list.length) {
          activeId = null;
          render();
          return;
        }
        const row = list[i++];
        activeId = row.id;
        render();
        document.querySelector(`[data-id="${CSS.escape(row.id)}"]`)?.scrollIntoView({block:'center', behavior:'smooth'});
        if (playAudioSegment(row.id, next)) return;
        if (!('speechSynthesis' in window)) return;
        const utterance = new SpeechSynthesisUtterance(row.en);
        utterance.lang = 'en-US';
        utterance.rate = 0.92;
        utterance.pitch = 1;
        utterance.onend = () => setTimeout(next, readingGapMs());
        speechSynthesis.speak(utterance);
      };
      next();
    }
    category.innerHTML = ['전체', ...new Set(DATA.map(item => item.categoryKo))].map(item => `<option>${escapeHtml(item)}</option>`).join('');
    cards.addEventListener('click', event => {
      if (event.target.closest('.char')) return;
      const card = event.target.closest('.card');
      if (!card) return;
      if (event.target.closest('.check-answer')) {
        const input = card.querySelector('.test-answer');
        const result = card.querySelector('.test-result');
        if (!input || !result) return;
        const expected = normalizeAnswer(input.dataset.answer);
        const actual = normalizeAnswer(input.value);
        const ok = actual && actual === expected;
        result.textContent = ok ? '정답' : `다시 확인: ${input.dataset.answer}`;
        result.className = `test-result ${ok ? 'ok' : 'miss'}`;
        return;
      }
      if (event.target.closest('.reveal-answer')) {
        card.querySelector('.english')?.classList.toggle('revealed');
        return;
      }
      if (event.target.closest('.speak')) {
        speak(card.dataset.en, card.dataset.id);
        return;
      }
      if (event.target.closest('.done-toggle')) {
        done.has(card.dataset.id) ? done.delete(card.dataset.id) : done.add(card.dataset.id);
        save();
        render();
      }
      if (event.target.closest('.reset-stress')) {
        delete customStress[card.dataset.id];
        saveStressEdits();
        render();
      }
      if (event.target.closest('.clear-stress')) {
        customStress[card.dataset.id] = [];
        saveStressEdits();
        render();
      }
    });
    cards.addEventListener('keydown', event => {
      if (event.key !== 'Enter') return;
      const input = event.target.closest('.test-answer');
      if (!input) return;
      event.preventDefault();
      input.closest('.card')?.querySelector('.check-answer')?.click();
    });
    cards.addEventListener('pointerdown', event => {
      const char = event.target.closest('.char');
      if (!char || !editMode) return;
      event.preventDefault();
      const id = char.dataset.id;
      const set = manualSetFor(id);
      dragPaint = !set.has(Number(char.dataset.index));
      paintChar(char, dragPaint);
      char.setPointerCapture?.(event.pointerId);
    });
    cards.addEventListener('pointerover', event => {
      const char = event.target.closest('.char');
      if (!char || dragPaint === null || !editMode) return;
      paintChar(char, dragPaint);
    });
    window.addEventListener('pointerup', () => {
      dragPaint = null;
    });
    [search, category, mode, filter].forEach(input => input.addEventListener('input', render));
    gapSeconds.addEventListener('input', () => {
      localStorage.setItem(GAP_KEY, gapSeconds.value || '1');
    });
    document.getElementById('readVisible').addEventListener('click', () => speakQueue(rows().slice(0, 80)));
    document.getElementById('toggleEdit').addEventListener('click', event => {
      editMode = !editMode;
      event.currentTarget.textContent = editMode ? '완료' : '편집';
      render();
    });
    document.getElementById('stopSpeech').addEventListener('click', () => {
      speechSynthesis?.cancel();
      stopAudio();
      activeId = null;
      render();
    });
    ttsAudio.addEventListener('timeupdate', () => {
      if (stopAt && ttsAudio.currentTime >= stopAt) {
        ttsAudio.pause();
      }
    });
    document.getElementById('toggleStress').addEventListener('click', event => {
      stressOn = !stressOn;
      event.currentTarget.textContent = '강세';
      render();
    });
    document.getElementById('toggleTest').addEventListener('click', event => {
      testMode = !testMode;
      event.currentTarget.textContent = testMode ? '시험종료' : '시험모드';
      render();
    });
    cacheMainAudio().catch(() => {});
    loadSharedState().then(render);
  </script>
</body>
</html>
