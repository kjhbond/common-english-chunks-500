    const storeKey = "common-english-chunks-500-done";
    const gapKey = "common-english-chunks-500-gap";
    const cards = document.getElementById("cards"), search = document.getElementById("search"), category = document.getElementById("category"), mode = document.getElementById("mode"), filter = document.getElementById("filter"), playbackRate = document.getElementById("playbackRate"), gapSeconds = document.getElementById("gapSeconds"), visibleCount = document.getElementById("visibleCount"), doneCount = document.getElementById("doneCount"), ttsAudio = document.getElementById("ttsAudio");
    const done = new Set(JSON.parse(localStorage.getItem(storeKey) || "[]"));
    let readingToken = 0, activeId = null, testMode = false, showStress = true;
    gapSeconds.value = localStorage.getItem(gapKey) || "1";
    const esc = v => String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
    const normalize = v => String(v || "").toLowerCase().replace(/[’‘]/g,"'").replace(/[“”]/g,'"').replace(/[^a-z0-9' ]+/g," ").replace(/\s+/g," ").trim();
    const audioSrc = item => `output/common_chunks_500_tts/speech/${String(item.id).padStart(3,"0")}.mp3`;
    function saveDone(){localStorage.setItem(storeKey, JSON.stringify([...done]));}
    function readingGapMs(){return Math.round(Math.max(0, Math.min(5, Number(gapSeconds.value || 1))) * 1000);}
    function stopAudio(){readingToken += 1; activeId = null; ttsAudio.pause(); ttsAudio.currentTime = 0; document.querySelectorAll(".card.reading").forEach(c=>c.classList.remove("reading"));}
    function playAudio(src){return new Promise(resolve=>{let settled=false; const finish=()=>{if(settled)return; settled=true; resolve();}; ttsAudio.pause(); ttsAudio.src=src; ttsAudio.playbackRate=Number(playbackRate.value); ttsAudio.currentTime=0; ttsAudio.onended=finish; ttsAudio.onpause=finish; ttsAudio.onerror=finish; ttsAudio.play().catch(finish);});}
    async function readItem(item){stopAudio(); activeId=item.id; render(); await playAudio(audioSrc(item)); activeId=null; render();}
    async function readVisibleItems(){stopAudio(); const token=readingToken; for(const item of currentItems().slice(0, 80)){if(token!==readingToken)break; activeId=item.id; render(); await playAudio(audioSrc(item)); if(token!==readingToken)break; activeId=null; render(); await new Promise(r=>setTimeout(r,readingGapMs()));}}
    function narrationChunks(item){const phrase = item.phrase.replace(/[’‘]/g,"\'"); const sentence = item.en.replace(/[’‘]/g,"\'"); const index = sentence.toLowerCase().indexOf(phrase.toLowerCase()); if(index >= 0){const before = sentence.slice(0,index).trim(); const hit = sentence.slice(index,index+phrase.length).trim(); const after = sentence.slice(index+phrase.length).trim(); return [before, hit, after].filter(Boolean);} return sentence.split(/,|;|\band\b|\bbut\b/i).map(s=>s.trim()).filter(Boolean).slice(0,4);}
    function narrationHtml(item){const chunks=narrationChunks(item); return `<div class="narration"><div class="narration-title">성우 낭독용 끊어읽기</div><div class="narration-chunks">${chunks.map((chunk,index)=>`${index ? '<span class="narration-sep">/</span>' : ''}<span class="narration-chip">${esc(chunk)}</span>`).join("")}</div></div>`;}
    function currentItems(){const q=search.value.trim().toLowerCase(), f=filter.value, c=category.value; return DATA.filter(item=>{const hay=`${item.category} ${item.phrase} ${item.meaning} ${item.en} ${item.ko}`.toLowerCase(); const isDone=done.has(item.id); return (!q||hay.includes(q)) && (!c||c==="전체"||item.category===c) && (f==="all" || (f==="done"&&isDone) || (f==="todo"&&!isDone));});}
    function render(){document.body.className=(mode.value==="both"?"":mode.value) + (showStress?"":" hidden-stress") + (testMode?" test-mode":""); const items=currentItems(); visibleCount.textContent=`표시 ${items.length}개`; doneCount.textContent=`완료 ${done.size} / ${DATA.length}개`; cards.innerHTML=""; if(!items.length){cards.innerHTML='<div class="empty">표시할 표현이 없습니다.</div>'; return;} let last=""; for(const item of items){if(item.category!==last){last=item.category; const group=document.createElement("div"); group.className="group"; group.textContent=last; cards.appendChild(group);} const card=document.createElement("article"); card.className=`card${done.has(item.id)?" done":""}${activeId===item.id?" reading":""}`; card.dataset.card=item.id; card.innerHTML=`<div class="meta"><div class="number-line"><span class="seq">${item.id}</span><span class="category">${esc(item.category)}</span></div><div class="phrase">${esc(item.phrase)}</div><div class="meaning">${esc(item.meaning)}</div></div><div class="example"><div class="chunk-label">예문</div><div class="english">${esc(item.en)}</div>${testMode ? `<input class="test-answer" data-answer="${esc(item.en)}" placeholder="영어 예문을 입력하세요" autocomplete="off" spellcheck="false"><div class="test-result"></div>` : ""}<div class="korean">${esc(item.ko)}</div>${narrationHtml(item)}</div><div class="actions"><button class="tiny listen" data-read="${item.id}">읽기</button>${testMode ? '<button class="tiny check-answer" type="button">확인</button><button class="tiny reveal-answer" type="button">정답</button>' : ''}<button class="tiny soft" data-toggle="${item.id}">${done.has(item.id)?"완료 해제":"완료"}</button></div>`; cards.appendChild(card);}}
    category.innerHTML = ["전체", ...new Set(DATA.map(item=>item.category))].map(item=>`<option>${esc(item)}</option>`).join("");
    cards.addEventListener("click", e=>{const readId=e.target.dataset.read, toggleId=e.target.dataset.toggle; if(readId){const item=DATA.find(row=>row.id===Number(readId)); if(item) readItem(item);} if(toggleId){const id=Number(toggleId); done.has(id)?done.delete(id):done.add(id); saveDone(); render();} if(e.target.closest(".check-answer")){const card=e.target.closest(".card"), input=card.querySelector(".test-answer"), result=card.querySelector(".test-result"), ok=normalize(input.value)===normalize(input.dataset.answer); result.className=`test-result ${ok?"ok":"bad"}`; result.textContent=ok?"정답입니다":"다시 입력해 보세요";} if(e.target.closest(".reveal-answer")){const card=e.target.closest(".card"), input=card.querySelector(".test-answer"), result=card.querySelector(".test-result"); input.value=input.dataset.answer; result.className="test-result"; result.innerHTML=`<span class="answer-reveal">${esc(input.dataset.answer)}</span>`;}});
    cards.addEventListener("keydown", e=>{if(e.target.classList.contains("test-answer") && e.key==="Enter") e.target.closest(".card")?.querySelector(".check-answer")?.click();});
    search.addEventListener("input",render); category.addEventListener("change",render); mode.addEventListener("change",render); filter.addEventListener("change",render); gapSeconds.addEventListener("input",()=>localStorage.setItem(gapKey,gapSeconds.value||"1")); document.getElementById("readVisible").addEventListener("click",readVisibleItems); document.getElementById("stopSpeech").addEventListener("click",()=>{stopAudio(); render();}); document.getElementById("toggleStress").addEventListener("click",event=>{showStress=!showStress; event.currentTarget.textContent=showStress?"끊어읽기":"끊어읽기 켜기"; render();}); document.getElementById("toggleTest").addEventListener("click",event=>{testMode=!testMode; event.currentTarget.textContent=testMode?"시험종료":"시험모드"; render();}); render();
